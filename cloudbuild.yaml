steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/researchdashboard', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/researchdashboard']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run', 'deploy', 'researchdashboard', '--image', 'gcr.io/$PROJECT_ID/researchdashboard', '--region', 'us-central1', '--platform', 'managed']

substitutions:
  _IMAGE_NAME: 'gcr.io/$PROJECT_ID/researchdashboard'
